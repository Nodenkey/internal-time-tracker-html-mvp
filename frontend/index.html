<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Time Tracker</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Internal Time Tracker</h1>
    <p class="subtitle">Minimal HTML MVP 
      
    </p>
  </header>

  <main class="app-main">
    <section class="panel">
      <h2>Log Time Entry</h2>
      <form id="entry-form" novalidate>
        <div class="form-row">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" required />
        </div>
        <div class="form-row">
          <label for="member_name">Member name</label>
          <input type="text" id="member_name" name="member_name" maxlength="100" required />
        </div>
        <div class="form-row">
          <label for="activity">Activity</label>
          <textarea id="activity" name="activity" rows="2" maxlength="200" required></textarea>
        </div>
        <div class="form-row">
          <label for="hours">Hours</label>
          <input type="number" id="hours" name="hours" min="0.25" max="24" step="0.25" required />
        </div>
        <div class="form-actions">
          <button type="submit">Add entry</button>
        </div>
        <p id="form-error" class="message error" aria-live="polite"></p>
        <p id="form-success" class="message success" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Time Entries</h2>
        <button id="refresh-btn" type="button" class="secondary">Refresh</button>
      </div>
      <div id="entries-status" class="status" aria-live="polite"></div>
      <div class="table-wrapper">
        <table class="entries-table">
          <thead>
            <tr>
              <th scope="col">Date</th>
              <th scope="col">Member</th>
              <th scope="col">Activity</th>
              <th scope="col">Hours</th>
              <th scope="col" class="actions-col">Actions</th>
            </tr>
          </thead>
          <tbody id="entries-body">
            <!-- rows injected by app.js -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <small>Backend API: <code>http://localhost:8000/api/v1</code></small>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
